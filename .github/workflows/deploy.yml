name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy built assets via SCP
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
            -i ~/.ssh/id_ed25519 \
            -r public/build \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}:/home/u988484627/domains/hotel-booking.researchsoft.in/public/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            cd /home/u988484627/domains/hotel-booking.researchsoft.in

            git pull origin main

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force

            # Fix storage symlink
            rm -f public/storage
            ln -s /home/u988484627/domains/hotel-booking.researchsoft.in/storage/app/public \
                  /home/u988484627/domains/hotel-booking.researchsoft.in/public/storage

            chmod -R 755 storage
            chmod -R 755 storage/app/public
            chmod -R 755 bootstrap/cache

            php artisan optimize:clear
            php artisan optimize