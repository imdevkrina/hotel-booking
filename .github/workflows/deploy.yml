name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Copy built assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "public/build/"
          target: "/home/u988484627/domains/hotel-booking.researchsoft.in/public/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            cd /home/u988484627/domains/hotel-booking.researchsoft.in

            # Pull latest code
            git pull origin main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader

            # Run migrations
            php artisan migrate --force

            # Fix storage symlink (manual absolute path to avoid public_html symlink confusion)
            rm -f public/storage
            ln -s /home/u988484627/domains/hotel-booking.researchsoft.in/storage/app/public \
                  /home/u988484627/domains/hotel-booking.researchsoft.in/public/storage

            # Set permissions
            chmod -R 755 storage
            chmod -R 755 storage/app/public
            chmod -R 755 bootstrap/cache

            # Clear and rebuild cache
            php artisan optimize:clear
            php artisan optimize